name: Deploy SA MedAssist

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.ORACLE_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          rsync -az --delete \
            --exclude node_modules \
            --exclude .git \
            ./ "${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }}:/opt/sa-medassist-pilot/"

      - name: Install, migrate, publish, and reload
        run: |
          ssh "${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_HOST }}" <<'SSH'
            set -euo pipefail
            cd /opt/sa-medassist-pilot
            npm install
            npm run db:migrate
            npm run build
            sudo rsync -a --delete client/dist/ /var/www/sa-medassist/
            pm2 startOrReload ecosystem.config.cjs --only sa-medassist-api
            pm2 save
          SSH
